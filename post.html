  <style>
    :root {
      --bg:         #F8F7F4;
      --bg-alt:     #EFEDE8;
      --bg-card:    #FFFFFF;
      --bg-dark:    #0F172A;
      --text-h:     #0F172A;
      --text-body:  #374151;
      --text-muted: #9CA3AF;
      --accent:     #0EA5E9;
      --accent-dark:#0284C7;
      --border:     rgba(15,23,42,0.08);
      --border-md:  rgba(15,23,42,0.13);
      --shadow-sm:  0 1px 4px rgba(15,23,42,0.06);
      --shadow-md:  0 6px 24px rgba(15,23,42,0.08);
      --shadow-lg:  0 16px 48px rgba(15,23,42,0.12);
      --r-sm:6px; --r-md:12px; --r-lg:18px;
      --nav-h:64px;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-sans:  'Syne', system-ui, sans-serif;
      --c-review:#0B7A63;   --c-review-bg:#E6F5F1;
      --c-guide:#7C3AED;    --c-guide-bg:#F3E8FF;
      --c-news:#DC2626;     --c-news-bg:#FEF2F2;
      --c-tutorial:#0EA5E9; --c-tutorial-bg:#E0F2FE;
      --c-tools:#D97706;    --c-tools-bg:#FEF3C7;
      --c-compare:#BE185D;  --c-compare-bg:#FCE7F3;
    }
    [data-theme="dark"] {
      --bg:#0B0F1A; --bg-alt:#111827; --bg-card:#161D2E;
      --text-h:#F1F5F9; --text-body:#94A3B8; --text-muted:#475569;
      --border:rgba(255,255,255,0.06); --border-md:rgba(255,255,255,0.10);
      --shadow-sm:0 1px 4px rgba(0,0,0,0.3); --shadow-md:0 6px 24px rgba(0,0,0,0.4); --shadow-lg:0 16px 48px rgba(0,0,0,0.6);
      --c-review:#34D399; --c-review-bg:#032917;
      --c-guide:#C084FC;  --c-guide-bg:#2D1052;
      --c-news:#F87171;   --c-news-bg:#450A0A;
      --c-tutorial:#38BDF8; --c-tutorial-bg:#0C2840;
      --c-tools:#FCD34D;  --c-tools-bg:#3D2000;
      --c-compare:#F9A8D4; --c-compare-bg:#4A0828;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;font-size:16px}
    body{font-family:var(--font-sans);background:var(--bg);color:var(--text-body);line-height:1.65;transition:background .3s,color .3s}
    img{display:block;max-width:100%;object-fit:cover}
    a{color:inherit;text-decoration:none}
    ul{list-style:none}
    button{font-family:var(--font-sans);cursor:pointer;border:none;background:none}

    /* NAVBAR */
    .navbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);height:var(--nav-h);transition:background .3s}
    .navbar.scrolled{background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(16px)}
    .nav-inner{max-width:900px;margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;gap:16px}
    .nav-logo{display:flex;align-items:center;gap:9px;font-size:20px;font-weight:800;color:var(--text-h);letter-spacing:-0.02em}
    .logo-mark{width:32px;height:32px;background:var(--bg-dark);border-radius:7px;display:flex;align-items:center;justify-content:center}
    [data-theme="dark"] .logo-mark{background:var(--accent)}
    .logo-mark svg{width:18px;height:18px;fill:#38BDF8}
    [data-theme="dark"] .logo-mark svg{fill:#0F172A}
    .nav-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text-muted);padding:6px 12px;border:1px solid var(--border-md);border-radius:var(--r-sm);transition:all .15s;margin-left:auto}
    .nav-back:hover{color:var(--accent);border-color:var(--accent)}
    .nav-back svg{width:14px;height:14px}
    .btn-theme{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);color:var(--text-muted);transition:all .15s}
    .btn-theme:hover{background:var(--bg-alt);color:var(--text-h)}
    .btn-theme svg{width:17px;height:17px}

    /* ARTICLE LAYOUT */
    .article-wrap{max-width:900px;margin:0 auto;padding:40px 24px 80px}

    /* Hero image */

    .article-hero-placeholder{font-size:80px;opacity:0.15}

    /* Category tag */
    .cat-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:4px 11px;border-radius:100px;margin-bottom:14px}

    .cat-guide    {color:var(--c-guide);    background:var(--c-guide-bg)}
    .cat-news     {color:var(--c-news);     background:var(--c-news-bg)}
    .cat-tutorial {color:var(--c-tutorial); background:var(--c-tutorial-bg)}
    .cat-tools    {color:var(--c-tools);    background:var(--c-tools-bg)}
    .cat-compare  {color:var(--c-compare);  background:var(--c-compare-bg)}

    /* Title & meta */
    .article-title{font-family:var(--font-serif);font-size:clamp(28px,5vw,46px);color:var(--text-h);line-height:1.12;letter-spacing:-0.02em;margin-bottom:16px;font-weight:400}
    .article-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--text-muted);padding-bottom:24px;border-bottom:1px solid var(--border);margin-bottom:32px}

    .article-body h2{font-size:26px;padding-bottom:10px;border-bottom:1px solid var(--border)}
    .article-body h3{font-size:21px;color:var(--accent)}
    .article-body h4{font-size:18px}
    .article-body p{margin-bottom:22px}
    .article-body ul,.article-body ol{margin:0 0 22px 26px}
    .article-body li{margin-bottom:8px;line-height:1.7}
    .article-body blockquote{border-left:4px solid var(--accent);padding:14px 22px;background:rgba(14,165,233,0.06);border-radius:0 var(--r-sm) var(--r-sm) 0;margin:24px 0;font-style:italic;color:var(--text-body)}
    .article-body a{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
    .article-body strong{color:var(--text-h);font-weight:700}
    .article-body em{font-style:italic}

    /* Affiliate CTA */

    .affiliate-cta-btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;background:var(--accent);color:#fff;border-radius:var(--r-sm);font-size:14px;font-weight:700;transition:background .15s;white-space:nowrap}

    .share-bar{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 24px;margin-top:36px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .share-label{font-size:13px;font-weight:700;color:var(--text-h)}

    .share-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--border-md);background:var(--bg-alt);color:var(--text-body);transition:all .15s}
    .share-btn:hover{border-color:var(--accent);color:var(--accent)}
    .share-btn svg{width:13px;height:13px}

    /* Related posts */
    .related-section{margin-top:52px}
    .related-title{font-family:var(--font-serif);font-size:22px;color:var(--text-h);margin-bottom:20px;font-weight:400}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
    .related-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;cursor:pointer;transition:box-shadow .2s,transform .2s}
    .related-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
    .related-card-title{font-family:var(--font-serif);font-size:15px;color:var(--text-h);line-height:1.35;margin:8px 0 6px;font-weight:400}
    .related-card-meta{font-size:11px;color:var(--text-muted)}

    /* Back to top */
    .back-to-top{position:fixed;bottom:28px;right:28px;width:42px;height:42px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);cursor:pointer;border:none;opacity:0;pointer-events:none;transition:all .25s;z-index:500}
    .back-to-top.show{opacity:1;pointer-events:all}
    .back-to-top:hover{background:var(--accent-dark);transform:translateY(-2px)}
    .back-to-top svg{width:18px;height:18px}

    /* Not found */
    .not-found{text-align:center;padding:80px 24px;color:var(--text-muted)}
    .not-found h1{font-family:var(--font-serif);font-size:36px;color:var(--text-h);margin-bottom:12px;font-weight:400}
    .not-found p{font-size:16px;margin-bottom:24px}
    .not-found a{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--accent);color:#fff;border-radius:var(--r-sm);font-size:14px;font-weight:700}

    /* Footer */
    .site-footer{background:var(--bg-dark);color:#94A3B8;padding:32px 0;margin-top:60px;text-align:center;font-size:13px}
    .site-footer a{color:var(--accent);margin:0 8px}

    /* Loading */
    .loading{display:flex;align-items:center;justify-content:center;padding:80px;color:var(--text-muted);font-size:15px;gap:10px}
    .spinner{width:20px;height:20px;border:2px solid var(--border-md);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Reading progress bar */
    .progress-bar{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:999;transition:width .1s linear;width:0%}

    /* Responsive */
    @media(max-width:640px){
      .article-wrap{padding:24px 16px 60px}
      .article-hero{height:220px}
      .article-title{font-size:26px}
      .article-body{font-size:15px}
      .share-bar{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>

<script>
/* ─────────────────────────────────────────────
   STORAGE
───────────────────────────────────────────── */
const POSTS_KEY = 'toolsx-posts';
const THEME_KEY = 'toolsx-theme';

function getPosts() {
  try { return JSON.parse(localStorage.getItem(POSTS_KEY)) || []; } catch { return []; }
}

/* ─────────────────────────────────────────────
   THEME
───────────────────────────────────────────── */
const htmlEl = document.documentElement;
const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
htmlEl.setAttribute('data-theme', savedTheme);
function syncTheme(t) {
  document.getElementById('iconSun').style.display  = t === 'dark' ? 'none' : '';
  document.getElementById('iconMoon').style.display = t === 'dark' ? ''     : 'none';
}
syncTheme(savedTheme);
document.getElementById('themeToggle').addEventListener('click', () => {
  const n = htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  htmlEl.setAttribute('data-theme', n);
  localStorage.setItem(THEME_KEY, n);
  syncTheme(n);
});

/* ─────────────────────────────────────────────
   NAVBAR SCROLL
───────────────────────────────────────────── */
window.addEventListener('scroll', () => {
  document.getElementById('mainNav').classList.toggle('scrolled', scrollY > 10);
  document.getElementById('backToTop').classList.toggle('show', scrollY > 400);
  // Reading progress
  const doc = document.documentElement;
  const scrolled = (doc.scrollTop / (doc.scrollHeight - doc.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = Math.min(scrolled, 100) + '%';
}, { passive: true });

/* ─────────────────────────────────────────────
   CATEGORY CONFIG
───────────────────────────────────────────── */
const CAT = {
  review:   { label:'AI Review',  emoji:'⭐' },
  guide:    { label:'Guide',      emoji:'📖' },
  news:     { label:'News',       emoji:'📰' },
  tutorial: { label:'Tutorial',   emoji:'🎓' },
  tools:    { label:'Tools',      emoji:'🔧' },
  compare:  { label:'Compare',    emoji:'⚖️' },
};

/* ─────────────────────────────────────────────
   SLUG — convert title to URL-safe slug
───────────────────────────────────────────── */
function slugify(text) {
  return (text || '').toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .slice(0, 80);
}

/* ─────────────────────────────────────────────
   GET POST ID FROM URL
   Supports: post.html?id=123  AND  post.html?slug=my-title
───────────────────────────────────────────── */
function getPostFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const posts  = getPosts().filter(p => p.status === 'published');
  if (params.has('id')) {
    return posts.find(p => p.id === params.get('id')) || null;
  }
  if (params.has('slug')) {
    return posts.find(p => slugify(p.title) === params.get('slug')) || null;
  }
  return null;
}

/* ─────────────────────────────────────────────
   MARKDOWN / AUTO FORMAT
───────────────────────────────────────────── */
function autoFormat(raw) {
  if (!raw) return '<p>No content available.</p>';
  if (/<[a-z][\s\S]*>/i.test(raw)) return raw;
  const lines = raw.split(/\n+/).filter(l => l.trim());
  let out = [];
  let i = 0;
  while (i < lines.length) {
    let line = lines[i].trim();
    if (/^#{3}\s/.test(line)) { out.push(`<h3>${mdInline(line.slice(4))}</h3>`); i++; continue; }
    if (/^#{2}\s/.test(line)) { out.push(`<h2>${mdInline(line.slice(3))}</h2>`); i++; continue; }
    if (/^#\s/.test(line))    { out.push(`<h2>${mdInline(line.slice(2))}</h2>`); i++; continue; }
    if (/^>\s?/.test(line))   { out.push(`<blockquote>${mdInline(line.replace(/^>\s?/, ''))}</blockquote>`); i++; continue; }
    if (/^[-*+]\s/.test(line)) {
      const items = [];
      while (i < lines.length && /^[-*+]\s/.test(lines[i].trim())) {
        items.push(`<li>${mdInline(lines[i].trim().replace(/^[-*+]\s/, ''))}</li>`);
        i++;
      }
      out.push(`<ul>${items.join('')}</ul>`);
      continue;
    }
    if (/^\d+\.\s/.test(line)) {
      const items = [];
      while (i < lines.length && /^\d+\.\s/.test(lines[i].trim())) {
        items.push(`<li>${mdInline(lines[i].trim().replace(/^\d+\.\s/, ''))}</li>`);
        i++;
      }
      out.push(`<ol>${items.join('')}</ol>`);
      continue;
    }
    // Short line = subheading
    const next = lines[i + 1] || '';
    if (line.length < 70 && !line.endsWith('.') && !line.endsWith(',') && next.length > line.length && i > 0) {
      out.push(`<h3>${mdInline(line)}</h3>`); i++; continue;
    }
    out.push(`<p>${mdInline(line)}</p>`);
    i++;
  }
  return out.join('\n');
}

function mdInline(s) {
  return s
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/_(.+?)_/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}

function stripHtml(s) { return String(s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim(); }
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ─────────────────────────────────────────────
   READING TIME
───────────────────────────────────────────── */
function readingTime(text) {
  const words = stripHtml(text).split(/\s+/).filter(Boolean).length;
  const mins  = Math.max(1, Math.round(words / 200));
  return mins + ' min read';
}

/* ─────────────────────────────────────────────
   UPDATE SEO META TAGS DYNAMICALLY
───────────────────────────────────────────── */
function updateSEO(post) {
  const url   = 'https://toolsx.online/post.html?slug=' + slugify(post.title);
  const desc  = post.meta || stripHtml(post.content || '').slice(0, 160);
  const img   = post.featuredImg || '';
  const cat   = CAT[post.category] || {};

  // Basic tags
  document.getElementById('pageTitle').textContent        = post.title + ' — ToolsX';
  document.getElementById('metaDesc').content             = desc;
  document.getElementById('metaKeywords').content         = (post.tags || '') + ', AI tools, ToolsX';
  document.getElementById('metaAuthor').content           = post.author || 'ToolsX';
  document.getElementById('canonicalLink').href           = url;

  // OG
  document.getElementById('ogTitle').content              = post.title;
  document.getElementById('ogDesc').content               = desc;
  document.getElementById('ogImg').content                = img;
  document.getElementById('ogUrl').content                = url;

  // Twitter
  document.getElementById('twTitle').content              = post.title;
  document.getElementById('twDesc').content               = desc;
  document.getElementById('twImg').content                = img;

  // JSON-LD structured data
  const ld = {
    '@context': 'https://schema.org',
    '@type': 'Article',
    'headline': post.title,
    'description': desc,
    'url': url,
    'datePublished': post.date,
    'dateModified': post.date,
    'author': { '@type': 'Person', 'name': post.author || 'ToolsX' },
    'publisher': { '@type': 'Organization', 'name': 'ToolsX', 'url': 'https://toolsx.online' },
    'articleSection': cat.label || post.category,
    'keywords': post.tags || '',
    'image': img ? [img] : []
  };
  document.getElementById('ldJson').textContent = JSON.stringify(ld);

  // Page title
  document.title = post.title + ' — ToolsX';
}

/* ─────────────────────────────────────────────
   RENDER ARTICLE
───────────────────────────────────────────── */
function renderArticle(post) {
  updateSEO(post);

  const cat      = CAT[post.category] || {};
  const bodyHtml = autoFormat(post.rawContent || post.content || '');
  const rt       = readingTime(post.content || '');

  // Hero image or placeholder
  const heroHtml = post.featuredImg
    ? `<img src="${escH(post.featuredImg)}" alt="${escH(post.title)}" onerror="this.parentElement.innerHTML='<span class=article-hero-placeholder>${cat.emoji||'📝'}</span>'" />`
    : `<span class="article-hero-placeholder">${cat.emoji || '📝'}</span>`;

  // Affiliate CTA
  const affiliateHtml = post.affiliateUrl ? `
    <div class="affiliate-cta">
      <div class="affiliate-cta-text">
        Ready to try this tool?
        <span>Disclosure: Affiliate link — we earn a small commission at no extra cost to you.</span>
      </div>
      <a href="${escH(post.affiliateUrl)}" target="_blank" rel="noopener sponsored" class="affiliate-cta-btn">
        Get Access
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg>
      </a>
    </div>` : '';

  // Tags
  const tagsHtml = post.tags
    ? `<div class="article-tags">${post.tags.split(',').map(t => t.trim()).filter(Boolean).map(t => `<span class="article-tag">#${escH(t)}</span>`).join('')}</div>`
    : '';

  // Related posts
  const allPosts   = getPosts().filter(p => p.status === 'published' && p.id !== post.id);
  const sameCat    = allPosts.filter(p => p.category === post.category).slice(0, 3);
  const related    = sameCat.length ? sameCat : allPosts.slice(0, 3);
  const relatedHtml = related.length ? `
    <div class="related-section">
      <h2 class="related-title">More Articles</h2>
      <div class="related-grid">
        ${related.map(r => `
          <div class="related-card" onclick="window.location.href='post.html?slug=${slugify(r.title)}'">
            <span class="cat-tag cat-${r.category}">${(CAT[r.category]||{}).label||r.category}</span>
            <div class="related-card-title">${escH(r.title)}</div>
            <div class="related-card-meta">${r.date} · ${readingTime(r.content||'')}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  // Share bar
  const shareUrl   = encodeURIComponent('https://toolsx.online/post.html?slug=' + slugify(post.title));
  const shareTitle = encodeURIComponent(post.title);
  const shareHtml  = `
    <div class="share-bar">
      <span class="share-label">Share this article</span>
      <div class="share-btns">
        <a class="share-btn" href="https://twitter.com/intent/tweet?url=${shareUrl}&text=${shareTitle}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          Twitter / X
        </a>
        <a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </a>
        <button class="share-btn" onclick="navigator.clipboard.writeText(decodeURIComponent('${shareUrl}')).then(()=>{this.textContent='✓ Copied!';setTimeout(()=>{this.innerHTML='<svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'2\\'><rect x=\\'9\\' y=\\'9\\' width=\\'13\\' height=\\'13\\' rx=\\'2\\'/><path d=\\'M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\\'/></svg> Copy link';},2000)})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy link
        </button>
      </div>
    </div>`;

  document.getElementById('articleMain').innerHTML = `
    <div class="article-wrap">
      <div class="article-hero">${heroHtml}</div>
      <span class="cat-tag cat-${post.category}">${cat.label || post.category}</span>
      <h1 class="article-title">${escH(post.title)}</h1>
      <div class="article-meta">
        <span class="meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${post.date}
        </span>
        <span class="meta-divider"></span>
        <span class="meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          ${escH(post.author || 'ToolsX')}
        </span>
        <span class="meta-divider"></span>
        <span class="meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${rt}
        </span>
      </div>
      <div class="article-body">${bodyHtml}</div>
      ${affiliateHtml}
      ${tagsHtml}
      ${shareHtml}
      ${relatedHtml}
    </div>`;

  document.getElementById('siteFooter').style.display = 'block';
  document.getElementById('footerYear').textContent   = new Date().getFullYear();
}

/* ─────────────────────────────────────────────
   SHOW NOT FOUND
───────────────────────────────────────────── */
function showNotFound() {
  document.getElementById('articleMain').innerHTML = `
    <div class="not-found">
      <h1>Article Not Found</h1>
      <p>This article may have been removed or the link is incorrect.</p>
      <a href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to ToolsX
      </a>
    </div>`;
  document.getElementById('siteFooter').style.display = 'block';
  document.getElementById('footerYear').textContent   = new Date().getFullYear();
}

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
const post = getPostFromUrl();
if (post) {
  renderArticle(post);
} else {
  showNotFound();
}

console.log('%c ToolsX Post ', 'background:#0F172A;color:#38BDF8;font-size:13px;font-weight:bold;padding:4px 12px;border-radius:4px;');
</script>
