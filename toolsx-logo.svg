<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#30b0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#070a1f"/>
  
  <!-- Glow effect background -->
  <circle cx="64" cy="64" r="55" fill="url(#logoGrad)" opacity="0.1"/>
  
  <!-- Main geometric shape: Stylized X with tools -->
  <!-- Left tool icon (wrench) -->
  <g transform="translate(32, 40)">
    <rect x="4" y="0" width="6" height="16" rx="3" fill="url(#logoGrad)"/>
    <circle cx="15" cy="8" r="8" fill="none" stroke="url(#logoGrad)" stroke-width="2.5"/>
    <path d="M 20 3 Q 24 8 20 13" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Right tool icon (screwdriver) -->
  <g transform="translate(60, 40)">
    <rect x="6" y="0" width="4" height="16" rx="2" fill="url(#logoGrad)"/>
    <polygon points="8,16 4,24 12,24" fill="url(#logoGrad)"/>
  </g>
  
  <!-- Center connecting line with gradient -->
  <line x1="32" y1="64" x2="96" y2="64" stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Bottom section: Ascending bars (representing growth/power) -->
  <g transform="translate(35, 75)">
    <!-- Bar 1 -->
    <rect x="0" y="12" width="6" height="12" rx="2" fill="url(#logoGrad)" opacity="0.8"/>
    <!-- Bar 2 -->
    <rect x="12" y="6" width="6" height="18" rx="2" fill="url(#logoGrad)" opacity="0.9"/>
    <!-- Bar 3 -->
    <rect x="24" y="0" width="6" height="24" rx="2" fill="url(#logoGrad)" opacity="1"/>
  </g>
  
  <!-- Accent dots -->
  <circle cx="24" cy="28" r="2.5" fill="url(#logoGrad)" opacity="0.6"/>
  <circle cx="104" cy="28" r="2.5" fill="url(#logoGrad)" opacity="0.6"/>
  <circle cx="24" cy="100" r="2.5" fill="url(#logoGrad)" opacity="0.6"/>
  <circle cx="104" cy="100" r="2.5" fill="url(#logoGrad)" opacity="0.6"/>
</svg>
