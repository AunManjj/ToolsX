# Netlify Configuration for ToolsX 3D Website

[build]
  publish = "."
  command = "bash build.sh"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "admin.html"
  NODE_VERSION = "18.0.0"

# Headers for performance and security
[[headers]]
  for = "/*"
    [headers.values]
    # Security Headers
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    
    # Performance Headers
    Cache-Control = "public, max-age=3600"
    
    # CSP (Content Security Policy)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:"

# Specific cache rules for static assets
[[headers]]
  for = "/*.{js,css,woff,woff2,ttf}"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files - less aggressive caching
[[headers]]
  for = "/*.html"
    [headers.values]
    Cache-Control = "public, max-age=3600"

# Redirects
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/"
  status = 301

# Pretty URLs
[[redirects]]
  from = "/:path/index.html"
  to = "/:path/"
  status = 301

# Catch-all for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Netlify Analytics
[analytics]
  enabled = true

# Context-specific settings
[context.production]
  environment = { ADMIN_PASS = "" }

[context.deploy-preview]
  environment = { ADMIN_PASS = "demo" }
